name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: dmg
            arch: arm64
          - os: macos-latest
            target: dmg
            arch: x64
          - os: windows-latest
            target: nsis
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Windows: 下载 MinGit 用于打包进安装包
      - name: Download MinGit
        if: runner.os == 'Windows'
        run: node scripts/download-git-portable.js

      - name: Build server bundle
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            node scripts/build-server.mjs darwin ${{ matrix.arch }}
          else
            node scripts/build-server.mjs win32 ${{ matrix.arch }}
          fi

      - name: Build client bundles (main + preload + renderer)
        run: npm run build:client

      # macOS: 手动配置签名 keychain + partition-list
      # electron-builder 内部也会导入证书，但不一定设 partition-list，
      # 导致 codesign 在无头 CI 上弹 UI 确认对话框而挂起。
      # 这里先手动搞定，再把 CSC_KEYCHAIN 传给 electron-builder 让它复用。
      - name: Setup macOS signing keychain
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="ci-$(openssl rand -hex 12)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # 传给 electron-builder：CSC_KEYCHAIN 让它复用这个 keychain，不再自己创建
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # macOS: 预签名 dist-server 里的 Mach-O 文件
      # @electron/osx-sign 在签名大量文件时会卡死（原因不明），
      # 手动先签好 dist-server 里的 native 二进制，electron-builder 只签 Electron 框架。
      - name: Pre-sign server binaries
        if: runner.os == 'macOS'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Using identity: $IDENTITY"

          DIST_SERVER="dist-server/mac-${{ matrix.arch }}"
          echo "Signing .node files..."
          find "$DIST_SERVER/node_modules" -name "*.node" | while read f; do
            codesign --sign "$IDENTITY" --timestamp --force "$f"
            echo "  ✓ $(basename $f)"
          done

          echo "Signing node binary..."
          codesign --sign "$IDENTITY" --timestamp --force --options runtime "$DIST_SERVER/node"
          echo "  ✓ node"

          echo "Pre-signing complete."

      # macOS 打包（签名 + 公证）
      # --publish never：所有 publish 由 release job 单点控制，避免多 job 并发上传造成
      # latest-mac.yml 互相覆盖的时间窗口（那是 v0.98.4 "检查更新失败" 的根因之一）。
      - name: Build macOS (DMG + ZIP)
        if: runner.os == 'macOS'
        run: |
          ulimit -n 65536
          npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_KEYCHAIN: ${{ env.CSC_KEYCHAIN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Windows 打包
      # --publish never：和 mac 同理，由 release job 单点上传。
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npx electron-builder --win nsis --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/latest*.yml
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 所有 Release 默认 pre-release，手动在 GitHub 上将稳定版本标记为 latest

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # build job 改为 --publish never 后，draft release 不再由 electron-builder 自动创建，
      # 由 release job 显式创建，并通过 --generate-notes 从上一个 tag 的 commit 自动生成 changelog。
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists, skipping create"
          else
            gh release create "${{ github.ref_name }}" \
              --draft \
              --prerelease \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi

      # 合并双架构的 latest-mac.yml（本地生成，不上传；上传由下一步统一处理）
      - name: Generate merged latest-mac.yml
        run: |
          ARM64_YML=$(find artifacts -path '*arm64*' -name 'latest-mac.yml' | head -1)
          X64_YML=$(find artifacts -path '*x64*' -name 'latest-mac.yml' | head -1)

          if [ -n "$ARM64_YML" ] && [ -n "$X64_YML" ]; then
            echo "Merging $ARM64_YML + $X64_YML"
            node -e "
              const fs = require('fs');

              function parseYml(text) {
                const obj = { files: [] };
                let currentFile = null;
                for (const line of text.split('\n')) {
                  if (line.trim().startsWith('- url:')) {
                    currentFile = { url: line.split('url:')[1].trim() };
                    obj.files.push(currentFile);
                  } else if (currentFile && line.trim().startsWith('sha512:')) {
                    currentFile.sha512 = line.split('sha512:')[1].trim();
                  } else if (currentFile && line.trim().startsWith('size:')) {
                    currentFile.size = parseInt(line.split('size:')[1].trim());
                  } else if (!line.startsWith(' ') && !line.startsWith('-')) {
                    const kv = line.match(/^(\w+):\s*(.+)/);
                    if (kv && kv[1] !== 'files') obj[kv[1]] = kv[2].trim().replace(/^'(.*)'$/, '\$1');
                    currentFile = null;
                  }
                }
                return obj;
              }

              function dumpYml(obj) {
                let out = 'version: ' + obj.version + '\n';
                out += 'files:\n';
                for (const f of obj.files) {
                  out += '  - url: ' + f.url + '\n';
                  if (f.sha512) out += '    sha512: ' + f.sha512 + '\n';
                  if (f.size) out += '    size: ' + f.size + '\n';
                }
                if (obj.path) out += 'path: ' + obj.path + '\n';
                if (obj.sha512) out += 'sha512: ' + obj.sha512 + '\n';
                if (obj.releaseDate) out += \"releaseDate: '\" + obj.releaseDate + \"'\n\";
                return out;
              }

              const arm64 = parseYml(fs.readFileSync('$ARM64_YML', 'utf8'));
              const x64 = parseYml(fs.readFileSync('$X64_YML', 'utf8'));

              const merged = { ...arm64 };
              const allFiles = [...(arm64.files || []), ...(x64.files || [])];
              const seen = new Set();
              merged.files = allFiles.filter(f => {
                if (seen.has(f.url)) return false;
                seen.add(f.url);
                return true;
              });

              fs.writeFileSync('latest-mac.yml', dumpYml(merged));
              console.log('Merged latest-mac.yml with', merged.files.length, 'files');
            "
          elif [ -n "$ARM64_YML" ]; then
            echo "Only arm64 yml found, using as-is"
            cp "$ARM64_YML" latest-mac.yml
          elif [ -n "$X64_YML" ]; then
            echo "Only x64 yml found, using as-is"
            cp "$X64_YML" latest-mac.yml
          else
            echo "::error::No mac latest-mac.yml found in any artifact"
            exit 1
          fi

      # 单点上传所有 release assets（dmg/zip/exe/yml），blockmap 不上传
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "=== Uploading installers ==="
          find artifacts \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \) -print0 |
            while IFS= read -r -d '' f; do
              echo "  $f"
              gh release upload "${{ github.ref_name }}" "$f" --clobber
            done

          echo "=== Uploading latest.yml (Windows) ==="
          WIN_YML=$(find artifacts -name 'latest.yml' | head -1)
          if [ -n "$WIN_YML" ]; then
            echo "  $WIN_YML"
            gh release upload "${{ github.ref_name }}" "$WIN_YML" --clobber
          else
            echo "::warning::latest.yml not found (Windows build may have failed)"
          fi

          echo "=== Uploading latest-mac.yml (merged) ==="
          gh release upload "${{ github.ref_name }}" latest-mac.yml --clobber

      # 硬约束：release 必须包含所有必需产物，缺一个 CI 就 fail，draft 状态留给人手动检查。
      # 防止以后再有 shell 写漏 / electron-builder 配置改坏 / 单架构构建挂掉 造成的 yml 缺失。
      - name: Verify release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ASSETS=$(gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name')
          echo "=== Release assets ==="
          echo "$ASSETS"
          echo ""

          MISSING=()
          echo "$ASSETS" | grep -qx 'latest-mac.yml' || MISSING+=("latest-mac.yml")
          echo "$ASSETS" | grep -qx 'latest.yml' || MISSING+=("latest.yml")
          echo "$ASSETS" | grep -qE '^Hanako-.*-macOS-arm64\.dmg$' || MISSING+=("macOS-arm64.dmg")
          echo "$ASSETS" | grep -qE '^Hanako-.*-macOS-arm64\.zip$' || MISSING+=("macOS-arm64.zip")
          echo "$ASSETS" | grep -qE '^Hanako-.*-macOS-x64\.dmg$' || MISSING+=("macOS-x64.dmg")
          echo "$ASSETS" | grep -qE '^Hanako-.*-macOS-x64\.zip$' || MISSING+=("macOS-x64.zip")
          echo "$ASSETS" | grep -qE '^Hanako-.*-Windows-x64\.exe$' || MISSING+=("Windows-x64.exe")

          # 清洁性检查：不应该有 blockmap 漏进来
          if echo "$ASSETS" | grep -qE '\.blockmap$'; then
            echo "::warning::blockmap files leaked into release (should be excluded by design):"
            echo "$ASSETS" | grep -E '\.blockmap$'
          fi

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo ""
            echo "::error::Missing required assets: ${MISSING[*]}"
            echo "Release will remain as draft for manual inspection."
            exit 1
          fi
          echo ""
          echo "✓ All required assets present"

      - name: Publish release (un-draft, pre-release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --prerelease --draft=false
