name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: dmg
            arch: arm64
          - os: macos-latest
            target: dmg
            arch: x64
          - os: windows-latest
            target: nsis
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Windows: 下载 MinGit 用于打包进安装包
      - name: Download MinGit
        if: runner.os == 'Windows'
        run: node scripts/download-git-portable.js

      - name: Build server bundle
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            node scripts/build-server.mjs darwin ${{ matrix.arch }}
          else
            node scripts/build-server.mjs win32 ${{ matrix.arch }}
          fi

      - name: Build main bundle
        run: npm run build:main

      - name: Build renderer
        run: npm run build:renderer

      # macOS: 手动配置签名 keychain + partition-list
      # electron-builder 内部也会导入证书，但不一定设 partition-list，
      # 导致 codesign 在无头 CI 上弹 UI 确认对话框而挂起。
      # 这里先手动搞定，再把 CSC_KEYCHAIN 传给 electron-builder 让它复用。
      - name: Setup macOS signing keychain
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="ci-$(openssl rand -hex 12)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # 传给 electron-builder：CSC_KEYCHAIN 让它复用这个 keychain，不再自己创建
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      # macOS: 预签名 dist-server 里的 Mach-O 文件
      # @electron/osx-sign 在签名大量文件时会卡死（原因不明），
      # 手动先签好 dist-server 里的 native 二进制，electron-builder 只签 Electron 框架。
      - name: Pre-sign server binaries
        if: runner.os == 'macOS'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Using identity: $IDENTITY"

          DIST_SERVER="dist-server/mac-${{ matrix.arch }}"
          echo "Signing .node files..."
          find "$DIST_SERVER/node_modules" -name "*.node" | while read f; do
            codesign --sign "$IDENTITY" --timestamp --force "$f"
            echo "  ✓ $(basename $f)"
          done

          echo "Signing node binary..."
          codesign --sign "$IDENTITY" --timestamp --force --options runtime "$DIST_SERVER/node"
          echo "  ✓ node"

          echo "Pre-signing complete."

      # macOS 打包（签名 + 公证）
      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          ulimit -n 65536
          npx electron-builder --mac dmg --${{ matrix.arch }} --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_KEYCHAIN: ${{ env.CSC_KEYCHAIN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Windows 打包
      - name: Build Windows installer
        if: runner.os == 'Windows'
        run: npx electron-builder --win nsis --publish never
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.exe
          if-no-files-found: error

  # 双平台构建完成后，自动创建 GitHub Release 并上传安装包
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is on stable
        id: check
        run: |
          if git branch -r --contains "${{ github.ref_name }}" | grep -q 'origin/stable'; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.check.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
