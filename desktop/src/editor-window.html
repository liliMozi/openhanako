<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <title>Editor</title>
    <link rel="stylesheet" href="themes/warm-paper.css" id="themeSheet">
    <style>
        :root {
            --font-serif: 'Songti SC', 'Georgia', serif;
            --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: rgba(128, 128, 128, 0.2) transparent;
        }

        *::-webkit-scrollbar { width: 4px; height: 4px; }
        *::-webkit-scrollbar-track { background: transparent; }
        *::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.2); border-radius: 2px; }
        *::-webkit-scrollbar-thumb:hover { background: rgba(128, 128, 128, 0.4); }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── 工具栏 ── */
        .toolbar {
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 6px;
            flex-shrink: 0;
        }

        .toolbar-drag {
            flex: 1;
            -webkit-app-region: drag;
            height: 100%;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .toolbar-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
        }

        .tb-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: background 0.12s, color 0.12s;
            flex-shrink: 0;
            -webkit-app-region: no-drag;
        }

        .tb-btn:hover {
            background: var(--overlay-light);
            color: var(--text);
        }

        /* ── 编辑器区域 ── */
        .editor-body {
            flex: 1;
            overflow: hidden;
            margin: 0 8px 8px;
            border-radius: 8px;
            background: var(--bg-card, var(--bg));
            border: 1px solid var(--overlay-light);
        }

        .editor-body .cm-editor {
            height: 100%;
            background: transparent;
        }

        .editor-body .cm-editor.cm-focused { outline: none; }
        .editor-body .cm-scroller { overflow: auto; }
        .editor-body .cm-content { max-width: 720px; margin: 0 auto; padding: 0 12px; }

        .editor-body .cm-gutters {
            background: transparent;
            border-right: 1px solid var(--overlay-light);
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .editor-body .cm-activeLineGutter { background: transparent; color: var(--text); }
        .editor-body .cm-activeLine { background: var(--overlay-subtle); }
        .editor-body .cm-cursor { border-left-color: var(--text); }
        .editor-body .cm-selectionBackground { background: rgba(100, 140, 200, 0.15) !important; }

        /* H1 居中 */
        .cm-center-line { text-align: center; }

        /* HR widget */
        .cm-hr-widget {
            display: inline-block;
            width: 80%;
            vertical-align: middle;
            border-top: 1px solid var(--border);
        }

        /* 无衬线模式 */
        body.font-sans {
            --font-serif: system-ui, -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-drag">
            <span class="toolbar-title" id="editorTitle">Editor</span>
        </div>
        <button class="tb-btn" id="btnDock" title="Dock to panel">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="5" x2="5" y2="19"></line>
                <polyline points="5 9 5 19 15 19"></polyline>
            </svg>
        </button>
        <button class="tb-btn" id="btnClose" title="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>
    <div class="editor-body" id="editorBody"></div>
    <script type="module" src="./editor-window-entry.ts"></script>
</body>
</html>
