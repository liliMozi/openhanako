<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; connect-src 'self' ws://127.0.0.1:* http://127.0.0.1:*; img-src 'self' data: file: http://127.0.0.1:*; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self'; frame-src blob: data:;">
    <title>Hanako</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes/warm-paper.css" id="themeSheet">
</head>
<body>
    <div id="react-root"></div>
    <div class="titlebar">
        <button class="tb-toggle tb-toggle-left" id="tbToggleLeft" title="侧边栏">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
        </button>
        <div class="tb-tabs" id="tbTabs">
            <div class="tb-tabs-slider" id="tbSlider"></div>
            <button class="tb-tab active" data-tab="chat">聊天</button>
            <button class="tb-tab" data-tab="channels">
                频道
                <span class="tb-tab-badge hidden" id="channelTabBadge"></span>
            </button>
        </div>
        <button class="tb-toggle tb-toggle-right" id="tbToggleRight" title="书桌">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="15" y1="3" x2="15" y2="21"></line>
            </svg>
        </button>
    </div>

    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-inner">
                <!-- 聊天 tab 内容 -->
                <div class="sidebar-chat-content" id="sidebarChatContent">
                    <div class="sidebar-header">
                        <span class="sidebar-title"></span>
                        <div class="sidebar-header-actions">
                            <button class="sidebar-action-btn" id="newSessionBtn" title="">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <button class="sidebar-action-btn" id="settingsBtn" title="">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3"></circle>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                                </svg>
                            </button>
                            <button class="sidebar-action-btn" id="sidebarCollapseBtn" title="">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="15 6 9 12 15 18"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button class="sidebar-activity-bar sidebar-bridge-card" id="bridgeBar">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                        </svg>
                        <span id="bridgeBarLabel">接入</span>
                        <span class="sidebar-bridge-dot" id="bridgeDot"></span>
                    </button>
                    <button class="sidebar-activity-bar" id="activityBar">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                        </svg>
                        <span id="activityBarLabel">助手活动</span>
                    </button>
                    <button class="sidebar-activity-bar" id="automationBar">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <span>任务计划</span>
                        <span class="automation-count-badge" id="automationCountBadge"></span>
                    </button>
                    <button class="sidebar-activity-bar browser-bg-bar hidden" id="browserBgBar" title="后台浏览器运行中，点击查看">
                        <svg class="browser-bg-globe" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        </svg>
                        <span>后台浏览器</span>
                    </button>
                    <div class="session-list" id="sessionList"></div>
                </div>

                <!-- 频道 tab 内容 -->
                <div class="sidebar-channel-content hidden" id="sidebarChannelContent">
                    <div class="sidebar-header">
                        <span class="sidebar-title">频道 <span class="beta-badge">Beta</span></span>
                        <div class="sidebar-header-actions">
                            <button class="sidebar-action-btn" id="channelCreateBtn" title="新建频道">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <button class="sidebar-action-btn" id="channelCollapseBtn" title="">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="15 6 9 12 15 18"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="channel-list-wrap" id="channelListWrap">
                        <div class="channel-list" id="channelList"></div>
                        <div class="channel-disabled-overlay hidden" id="channelDisabledOverlay">
                            <span>频道功能已关闭</span>
                        </div>
                        <div class="channel-toggle-bar">
                            <span class="channel-toggle-bar-label">频道功能开关</span>
                            <button class="hana-toggle on" id="channelToggle"></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="resize-handle resize-handle-right" id="sidebarResizeHandle"></div>
        </aside>

        <div class="main-content">
            <!-- 浏览器浮动卡片：已迁移到 React (BrowserCard) -->
            <div id="browserCardPortal"></div>
            <div class="drop-overlay" id="dropOverlay">
                <div class="drop-overlay-inner">
                    <span class="drop-icon">📎</span>
                    <span class="drop-text"></span>
                </div>
            </div>

            <div class="chat-area" id="chatArea">
                <div class="welcome" id="welcome"></div>

                <div class="messages" id="messages"></div>
            </div>

            <div class="input-area">
                <div id="inputAreaPortal" style="display:contents"></div>
            </div>

            <!-- 频道视图（IM 模式） -->
            <div class="channel-view" id="channelView">
                <div class="channel-header" id="channelHeader">
                    <div class="channel-header-info">
                        <span class="channel-header-name" id="channelHeaderName"></span>
                        <span class="channel-header-members" id="channelHeaderMembers"></span>
                    </div>
                    <div class="channel-header-actions">
                        <button class="channel-header-action-btn" id="channelInfoToggle" title="频道信息">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="16" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                        </button>
                        <button class="channel-header-action-btn" id="channelMenuBtn" title="更多">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <circle cx="12" cy="5" r="1"></circle>
                                <circle cx="12" cy="12" r="1"></circle>
                                <circle cx="12" cy="19" r="1"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="channel-messages" id="channelMessages"></div>
                <div class="channel-input-area hidden" id="channelInputArea">
                    <div class="channel-input-wrapper">
                        <div class="channel-mention-dropdown hidden" id="channelMentionDropdown"></div>
                        <textarea class="channel-input-box" id="channelInputBox"
                                  placeholder="发消息..." rows="1" spellcheck="false"></textarea>
                        <button class="channel-send-btn" id="channelSendBtn" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="channel-readonly-notice hidden" id="channelReadonlyNotice">
                    <span>🔒 这是 Agent 之间的私信，仅可查看</span>
                </div>
            </div>

            <!-- 助手活动 + 任务计划面板：已迁移到 React (ActivityPanel / AutomationPanel) -->

            <!-- 接入面板（bridge）：已迁移到 React (BridgePanel) -->

        </div>

        <!-- Artifact 预览面板：已迁移到 React (PreviewPanel) -->
        <div id="previewPortal" style="display:contents"></div>

        <!-- 笺（Jian）右侧 sidebar -->
        <aside class="jian-sidebar" id="jianSidebar">
            <div class="resize-handle resize-handle-left" id="jianResizeHandle"></div>
            <div class="jian-sidebar-inner">
                <!-- 聊天 tab：书桌内容（已迁移到 React DeskSection） -->
                <div class="jian-chat-content" id="jianChatContent">
                    <div id="jianDeskPortal" style="display:contents"></div>
                </div>

                <!-- 频道 tab：频道信息 -->
                <div class="jian-channel-content hidden" id="jianChannelContent">
                    <div class="jian-card">
                        <div class="channel-info-section">
                            <div class="channel-info-label">频道信息</div>
                            <div class="channel-info-name" id="channelInfoName"></div>
                        </div>
                        <div class="channel-info-section">
                            <div class="channel-info-label">成员</div>
                            <div class="channel-members-list" id="channelMembersList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <div class="connection-status" id="connectionStatus">
        <span class="status-dot"></span>
        <span class="status-text"></span>
    </div>

    <!-- 新建频道弹窗 -->
    <div class="agent-create-overlay" id="channelCreateOverlay">
        <div class="agent-create-card">
            <h3 class="agent-create-title">新建频道</h3>
            <div class="settings-field">
                <label class="settings-field-label">频道名称</label>
                <input class="settings-input" type="text" id="channelCreateNameInput" placeholder="例如：design-team" autocomplete="off">
            </div>
            <div class="settings-field">
                <label class="settings-field-label">成员</label>
                <div class="channel-create-members" id="channelCreateMembers"></div>
            </div>
            <div class="settings-field">
                <label class="settings-field-label">频道介绍 <span style="color:var(--text-muted);font-weight:normal">（可选）</span></label>
                <textarea class="settings-input channel-create-intro" id="channelCreateIntroInput" rows="2" placeholder="描述一下这个频道的用途..." style="resize:vertical;min-height:2.4rem"></textarea>
            </div>
            <div class="agent-create-actions">
                <button class="agent-create-cancel" id="channelCreateCancelBtn">取消</button>
                <button class="agent-create-confirm" id="channelCreateConfirmBtn">创建</button>
            </div>
        </div>
    </div>

    <script src="lib/react-init.js"></script>
    <script src="lib/markdown-it.min.js"></script>
    <script src="lib/i18n.js"></script>
    <script src="lib/theme.js"></script>
    <script src="modules/platform.js"></script>
    <script src="modules/icons.js"></script>
    <script src="modules/utils.js"></script>
    <!-- file-cards.js + artifacts.js: 已迁移到 React -->
    <!-- chat-render.js: 已迁移到 bridge.ts (Phase 3e) -->
    <!-- activity.js + bridge.js: 已迁移到 React -->
    <!-- desk.js: 已迁移到 React (DeskSection + bridge.ts desk shim) -->
    <!-- sidebar.js + channels.js: 已迁移到 shims/sidebar-shim.ts + channels-shim.ts (Phase 3f) -->
    <script src="app.js"></script>
    <script type="module" src="./main.tsx"></script>
</body>
</html>
