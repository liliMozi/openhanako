<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; connect-src 'self' http://127.0.0.1:*; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
    <title>Skill Preview</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes/warm-paper.css" id="themeSheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg, #F4F0E4);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── 顶栏 ── */
        .sv-topbar {
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 0;
            -webkit-app-region: drag;
            border-bottom: 1px solid var(--border, #e0dcd0);
            flex-shrink: 0;
        }

        .sv-close {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: none;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted, #7a7568);
            -webkit-app-region: no-drag;
            transition: background 0.12s, color 0.12s;
            flex-shrink: 0;
        }

        .sv-close:hover {
            background: var(--overlay-light, rgba(0,0,0,0.06));
            color: var(--text, #3d3929);
        }

        .sv-close svg {
            width: 14px;
            height: 14px;
        }

        .sv-topbar-title {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted, #7a7568);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-left: 8px;
        }

        .sv-topbar-title .sv-skill-name {
            color: var(--text, #3d3929);
            font-weight: 600;
        }

        .sv-topbar-actions {
            display: flex;
            gap: 6px;
            -webkit-app-region: no-drag;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .sv-btn {
            padding: 5px 12px;
            font-size: 12px;
            font-family: inherit;
            border: 1px solid var(--border, #e0dcd0);
            border-radius: 6px;
            background: var(--bg, #F4F0E4);
            color: var(--text, #3d3929);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .sv-btn:hover {
            background: var(--accent-light, #f0ebe0);
            border-color: var(--accent, #bfa97a);
        }

        .sv-btn-primary {
            background: var(--accent, #bfa97a);
            color: #fff;
            border-color: var(--accent, #bfa97a);
        }

        .sv-btn-primary:hover {
            opacity: 0.9;
        }

        /* ── 主体 ── */
        .sv-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── 左侧文件树 ── */
        .sv-sidebar {
            width: 200px;
            min-width: 160px;
            border-right: 1px solid var(--border, #e0dcd0);
            overflow-y: auto;
            padding: 8px 0;
            flex-shrink: 0;
        }

        .sv-tree-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px 5px 16px;
            font-size: 13px;
            color: var(--text, #3d3929);
            cursor: pointer;
            transition: background 0.12s;
            user-select: none;
        }

        .sv-tree-item:hover {
            background: var(--accent-light, rgba(191,169,122,0.08));
        }

        .sv-tree-item.active {
            background: var(--accent-light, rgba(191,169,122,0.15));
            font-weight: 600;
        }

        .sv-tree-item .sv-icon {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted, #7a7568);
        }

        .sv-tree-item .sv-icon svg {
            width: 15px;
            height: 15px;
        }

        .sv-tree-item .sv-label {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sv-tree-folder > .sv-tree-item {
            font-weight: 500;
        }

        .sv-tree-children {
            padding-left: 12px;
        }

        .sv-tree-children.collapsed {
            display: none;
        }

        /* ── 右侧预览区 ── */
        .sv-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .sv-content .md-content {
            font-family: 'Songti SC', 'Georgia', serif;
            line-height: 1.75;
            max-width: 720px;
        }

        .sv-content .md-content h1 {
            text-align: center;
        }

        .sv-description {
            padding: 14px 16px;
            margin-bottom: 20px;
            background: var(--tool-bg, rgba(0,0,0,0.025));
            border-radius: 8px;
            max-width: 720px;
        }

        .sv-description-label {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted, #7a7568);
            margin-bottom: 6px;
        }

        .sv-description-text {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-light, #5a5548);
            white-space: pre-line;
        }

        .sv-content pre {
            background: var(--tool-bg, #f5f3ed);
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
        }

        .sv-content code {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 13px;
        }

        .sv-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted, #7a7568);
            font-size: 14px;
        }

        /* ── 提示 ── */
        .sv-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            background: var(--text, #3d3929);
            color: var(--bg, #F4F0E4);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .sv-toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="sv-topbar">
        <button class="sv-close" id="svClose" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <div class="sv-topbar-title">
            <span class="sv-skill-name" id="svSkillName"></span>
            <span id="svFileName"> / SKILL.md</span>
        </div>
        <div class="sv-topbar-actions">
            <button class="sv-btn sv-btn-primary" id="svCopyBtn" style="display:none">Copy to your skills</button>
        </div>
    </div>

    <div class="sv-body">
        <div class="sv-sidebar" id="svSidebar"></div>
        <div class="sv-content" id="svContent">
            <div class="sv-empty">Loading...</div>
        </div>
    </div>

    <div class="sv-toast" id="svToast"></div>

    <script src="lib/markdown-it.min.js"></script>
    <script>
    const md = window.markdownit({ html: true, linkify: true, breaks: true });

    const svSkillName = document.getElementById("svSkillName");
    const svFileName = document.getElementById("svFileName");
    const svSidebar = document.getElementById("svSidebar");
    const svContent = document.getElementById("svContent");
    const svCopyBtn = document.getElementById("svCopyBtn");
    const svClose = document.getElementById("svClose");
    const svToast = document.getElementById("svToast");

    let currentSkill = null;
    let currentFilePath = null;
    let serverPort = null;
    let serverToken = null;

    // SVG 图标
    const ICONS = {
        file: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
        markdown: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
        folder: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
        chevronRight: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
        chevronDown: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
        script: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
    };

    /** 根据文件名选择图标 */
    function fileIcon(name) {
        const ext = name.split(".").pop().toLowerCase();
        if (ext === "md" || ext === "markdown") return ICONS.markdown;
        if (["js", "py", "sh", "bash", "ts"].includes(ext)) return ICONS.script;
        return ICONS.file;
    }

    // ── 关闭窗口 ──
    svClose.addEventListener("click", () => window.hana.closeSkillViewer());

    // ── 初始化 ──
    (async () => {
        serverPort = await window.hana.getServerPort();
        serverToken = await window.hana.getServerToken();
    })();

    // ── 接收 skill 数据 ──
    window.hana.onSkillViewerLoad(async (skillInfo) => {
        currentSkill = skillInfo;
        svSkillName.textContent = skillInfo.name || "Skill";
        svCopyBtn.style.display = skillInfo.installed ? "none" : "";

        const files = await window.hana.listSkillFiles(skillInfo.baseDir);
        renderTree(files);

        const skillMdPath = skillInfo.filePath || (skillInfo.baseDir + "/SKILL.md");
        loadFile(skillMdPath, "SKILL.md");
    });

    // ── 渲染文件树 ──
    function renderTree(items) {
        svSidebar.innerHTML = "";
        const fragment = document.createDocumentFragment();
        for (const item of items) {
            fragment.appendChild(buildTreeNode(item));
        }
        svSidebar.appendChild(fragment);
    }

    function buildTreeNode(item) {
        if (item.isDir) {
            const folder = document.createElement("div");
            folder.className = "sv-tree-folder";

            const row = document.createElement("div");
            row.className = "sv-tree-item";
            // 默认展开，箭头朝下
            row.innerHTML = `<span class="sv-icon sv-chevron">${ICONS.chevronRight}</span><span class="sv-label">${esc(item.name)}</span>`;

            const children = document.createElement("div");
            children.className = "sv-tree-children collapsed";
            for (const child of item.children || []) {
                children.appendChild(buildTreeNode(child));
            }

            row.addEventListener("click", () => {
                const collapsed = children.classList.toggle("collapsed");
                row.querySelector(".sv-chevron").innerHTML = collapsed ? ICONS.chevronRight : ICONS.chevronDown;
            });

            folder.appendChild(row);
            folder.appendChild(children);
            return folder;
        }

        const row = document.createElement("div");
        row.className = "sv-tree-item";
        row.dataset.path = item.path;
        row.innerHTML = `<span class="sv-icon">${fileIcon(item.name)}</span><span class="sv-label">${esc(item.name)}</span>`;

        row.addEventListener("click", () => loadFile(item.path, item.name));
        return row;
    }

    /** 从 YAML frontmatter 文本中提取 description 值 */
    function parseFmDescription(fm) {
        // 找到 description 行
        const idx = fm.search(/^description:/m);
        if (idx === -1) return "";
        const fromDesc = fm.slice(idx);
        const lines = fromDesc.split("\n");
        const firstLine = lines[0];

        // 取 description: 后面的值
        let value = firstLine.replace(/^description:\s*/, "");

        // 带引号的字符串（可能跨多行）
        const quoteChar = value[0];
        if (quoteChar === '"' || quoteChar === "'") {
            let full = value.slice(1); // 去掉开头引号
            let i = 1;
            // 拼接后续行直到找到闭合引号
            while (!full.includes(quoteChar) && i < lines.length) {
                full += "\n" + lines[i].replace(/^ {2,}/, "");
                i++;
            }
            // 去掉闭合引号及之后的内容
            const closeIdx = full.indexOf(quoteChar);
            if (closeIdx !== -1) full = full.slice(0, closeIdx);
            return full.trim();
        }

        // YAML block scalar (| 或 >)
        if (value === "|" || value === ">" || value === "|+" || value === ">+") {
            let block = "";
            for (let i = 1; i < lines.length; i++) {
                if (/^\S/.test(lines[i])) break; // 下一个顶级 key
                block += lines[i].replace(/^ {2,}/, "") + "\n";
            }
            return block.trim();
        }

        // 普通单行值
        return value.trim();
    }

    // ── 加载文件内容 ──
    async function loadFile(filePath, fileName) {
        currentFilePath = filePath;
        svFileName.textContent = " / " + fileName;

        svSidebar.querySelectorAll(".sv-tree-item").forEach(el => {
            el.classList.toggle("active", el.dataset.path === filePath);
        });

        const content = await window.hana.readSkillFile(filePath);
        if (content == null) {
            svContent.innerHTML = `<div class="sv-empty">无法读取文件</div>`;
            return;
        }

        const ext = fileName.split(".").pop().toLowerCase();
        if (ext === "md" || ext === "markdown") {
            // 解析 frontmatter 中的 description
            let description = "";
            let body = content;
            const fmMatch = content.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);
            if (fmMatch) {
                body = content.slice(fmMatch[0].length);
                description = parseFmDescription(fmMatch[1]);
            }
            const descHtml = description ? `<div class="sv-description"><div class="sv-description-label">Description</div><div class="sv-description-text">${esc(description)}</div></div>` : "";
            svContent.innerHTML = descHtml + `<div class="md-content">${md.render(body)}</div>`;
        } else {
            svContent.innerHTML = `<pre><code>${esc(content)}</code></pre>`;
        }
    }

    // ── Copy to skills ──
    svCopyBtn.addEventListener("click", async () => {
        if (!currentSkill?.baseDir) return;
        try {
            const headers = { "Content-Type": "application/json" };
            if (serverToken) headers["Authorization"] = `Bearer ${serverToken}`;
            const res = await fetch(`http://127.0.0.1:${serverPort}/api/skills/install`, {
                method: "POST",
                headers,
                body: JSON.stringify({ path: currentSkill.baseDir }),
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            showToast("已复制到技能列表 ✓");
        } catch (err) {
            showToast("安装失败: " + err.message);
        }
    });

    function showToast(msg) {
        svToast.textContent = msg;
        svToast.classList.add("show");
        setTimeout(() => svToast.classList.remove("show"), 2000);
    }

    function esc(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
    }
    </script>
</body>
</html>
